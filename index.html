<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Weather Dashboard - Rome, GA</title>
    <link rel="icon" type="image/svg+xml" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='%23FFB000'/%3E%3Cpath d='M20 38c0-6.1 4.9-11 11-11 4.4 0 8.2 2.6 10 6.3 0.8-0.2 1.7-0.3 2.5-0.3 5.2 0 9.5 4.3 9.5 9.5S48.7 52 43.5 52h-19C18.7 52 14 47.3 14 41.5 14 36.8 16.7 32.8 20.6 31c-0.4 1.1-0.6 2.3-0.6 3.5 0 1.2 0.2 2.4 0.6 3.5H20z' fill='%2318120D' fill-opacity='0.75'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="UI_Design_Update/neumorphic-ui.css">
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            height: 100dvh;
            width: 100%;
            display: flex;
            flex-direction: column;
            font-family: var(--neu-font-family);
            overflow: hidden;
            background: var(--neu-base);
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        *::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        * {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .weather-container {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            padding: clamp(0.6rem, 1.25vmin, 1.15rem) clamp(0.9rem, 2vw, 1.75rem);
            gap: clamp(0.55rem, 1vmin, 0.95rem);
            width: 100%;
            height: 100%;
            min-height: 0;
            max-width: 1920px;
            margin: 0 auto;
            background: var(--neu-base);
        }

        .header {
            flex: 0 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(0.55rem, 1.1vmin, 0.85rem) clamp(0.9rem, 2vw, 1.5rem);
            background: var(--neu-base);
            border-radius: var(--neu-radius-lg);
            box-shadow:
                -10px -10px 20px var(--neu-light),
                10px 10px 20px var(--neu-dark);
            margin-bottom: 0;
        }

        .location {
            font-size: clamp(1.7rem, 3.6vw, 2.75rem);
            color: var(--neu-accent);
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .theme-toggle {
            background: var(--neu-base);
            border: none;
            border-radius: var(--neu-radius-full);
            width: clamp(2.75rem, 5.5vw, 3.75rem);
            height: clamp(2.75rem, 5.5vw, 3.75rem);
            cursor: pointer;
            font-size: clamp(1.2rem, 2.5vw, 1.75rem);
            box-shadow:
                -6px -6px 12px var(--neu-light),
                6px 6px 12px var(--neu-dark);
            transition: all var(--neu-transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            box-shadow:
                -8px -8px 16px var(--neu-light),
                8px 8px 16px var(--neu-dark);
        }

        .theme-toggle:active {
            box-shadow:
                inset -4px -4px 8px var(--neu-light),
                inset 4px 4px 8px var(--neu-dark);
        }

        #errorContainer {
            flex: 0 0 auto;
            min-height: 0;
            max-height: min(18vh, 8rem);
            overflow: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--neu-accent) transparent;
        }

        #errorContainer:empty {
            display: none;
        }

        #errorContainer::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        #errorContainer::-webkit-scrollbar-thumb {
            background: var(--neu-accent);
            border-radius: 999px;
        }

        #errorContainer .alert {
            margin: 0;
            overflow-wrap: anywhere;
        }

        .weather-grid {
            flex: 1 1 auto;
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 2fr) minmax(0, 1fr);
            grid-template-rows: minmax(0, 1fr);
            gap: clamp(0.75rem, 1.5vw, 1.5rem);
            align-items: stretch;
        }

        .hourly-section, .current-section, .daily-section {
            display: flex;
            flex-direction: column;
            gap: clamp(0.35rem, 0.8vmin, 0.65rem);
            min-height: 0;
            height: 100%;
        }

        .hourly-section, .daily-section {
            gap: clamp(0.2rem, 0.45vmin, 0.38rem);
            padding: clamp(0.05rem, 0.2vmin, 0.2rem) clamp(0.6rem, 1.2vw, 1rem);
        }

        #hourlyForecast, #dailyForecast {
            display: flex;
            flex-direction: column;
            flex: 1 1 auto;
            min-height: 0;
            gap: clamp(0.15rem, 0.4vmin, 0.35rem);
        }

        .current-section {
            display: flex;
            align-items: stretch;
            justify-content: stretch;
        }

        .current-card {
            width: 100%;
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: clamp(0.6rem, 1.4vmin, 1.1rem);
            background: var(--neu-base);
            border-radius: var(--neu-radius-xl);
            box-shadow:
                -12px -12px 24px var(--neu-light),
                12px 12px 24px var(--neu-dark);
        }

        #currentWeather {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            width: 100%;
            height: 100%;
            min-height: 0;
            gap: clamp(0.15rem, 0.35vmin, 0.3rem);
        }

        .weather-icon {
            font-size: clamp(5rem, min(12vw, 18vh), 11rem);
            margin: 0;
            animation: float 4s ease-in-out infinite;
            line-height: 1;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-15px) rotate(5deg);
            }
        }

        .current-temp {
            font-size: clamp(5.25rem, min(12vw, 18vh), 9.5rem);
            font-weight: 800;
            color: var(--neu-text);
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }

        .feels-like {
            font-size: clamp(1.8rem, min(4vw, 5.2vh), 2.8rem);
            color: var(--neu-accent);
            margin: 0;
            font-weight: 700;
        }

        .weather-details {
            display: flex;
            width: 100%;
            gap: clamp(0.6rem, 1.4vw, 1.3rem);
            margin-top: 0;
            flex-wrap: wrap;
            justify-content: space-evenly;
            align-items: stretch;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(0.15rem, 0.35vmin, 0.3rem);
            background: var(--neu-base);
            padding: clamp(0.5rem, 1vmin, 0.85rem) clamp(0.7rem, 1.6vw, 1.1rem);
            border-radius: var(--neu-radius-lg);
            box-shadow:
                inset -5px -5px 10px var(--neu-light),
                inset 5px 5px 10px var(--neu-dark);
            min-width: clamp(5rem, 11vw, 7rem);
            flex: 1 1 clamp(5rem, 11vw, 7rem);
        }

        .detail-label {
            font-size: clamp(0.85rem, 1.45vmin, 1.1rem);
            color: var(--neu-text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .detail-value {
            font-size: clamp(1.65rem, min(3.4vw, 4.6vh), 2.6rem);
            font-weight: 800;
            color: var(--neu-accent);
            letter-spacing: -0.5px;
        }

        .hourly-item, .daily-item {
            background: var(--neu-base);
            border-radius: var(--neu-radius-lg);
            padding: clamp(0.28rem, 0.55vmin, 0.5rem) clamp(0.45rem, 0.9vw, 0.75rem);
            box-shadow:
                -8px -8px 16px var(--neu-light),
                8px 8px 16px var(--neu-dark);
            display: flex;
            flex: 1 1 0;
            min-height: 0;
            justify-content: space-between;
            align-items: center;
            transition: all var(--neu-transition-normal);
            gap: clamp(0.3rem, 0.7vw, 0.6rem);
        }

        .hourly-item:hover, .daily-item:hover {
            box-shadow:
                -10px -10px 20px var(--neu-light),
                10px 10px 20px var(--neu-dark);
        }

        .hourly-time, .daily-day {
            font-weight: 700;
            color: var(--neu-text);
            font-size: clamp(1.2rem, min(2vw, 2.7vh), 1.5rem);
            white-space: nowrap;
            min-width: fit-content;
        }

        .daily-date {
            font-size: clamp(0.95rem, min(1.25vw, 2vh), 1.125rem);
            color: var(--neu-text-dim);
            font-weight: 600;
            margin-left: clamp(0.25rem, 0.5vw, 0.4rem);
        }

        .hourly-icon, .daily-icon {
            font-size: clamp(1.35rem, min(2.8vw, 4vh), 2.1rem);
            line-height: 1;
        }

        .hourly-temp, .daily-temps {
            font-weight: 700;
            color: var(--neu-accent);
            font-size: clamp(1.5rem, min(2.25vw, 4vh), 2rem);
        }

        .daily-temps {
            display: flex;
            gap: clamp(0.25rem, 0.5vw, 0.5rem);
            white-space: nowrap;
        }

        .temp-high {
            color: var(--neu-danger);
        }

        .temp-low {
            color: var(--neu-accent);
        }

        .precip-info {
            font-size: clamp(0.95rem, min(1.35vw, 2.2vh), 1.125rem);
            color: var(--neu-text-dim);
            font-weight: 600;
        }

        .section-title {
            color: var(--neu-text);
            font-size: clamp(1.1rem, 1.9vmin, 1.35rem);
            font-weight: 800;
            margin-bottom: clamp(0.2rem, 0.45vmin, 0.4rem);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .loading {
            text-align: center;
            padding: clamp(1rem, 3vh, 3rem);
        }

        .loading p {
            font-size: clamp(1.15rem, 2.2vw, 1.5rem);
            font-weight: 600;
        }

        .error-message {
            margin-top: clamp(0.5rem, 1vh, 1rem);
        }

        .last-updated {
            flex: 0 0 auto;
            text-align: center;
            color: var(--neu-text-dim);
            font-size: clamp(0.95rem, 1.35vmin, 1.05rem);
            margin-top: 0;
            padding: clamp(0.2rem, 0.45vmin, 0.4rem);
            font-weight: 600;
            opacity: 0.8;
        }

        /* Responsive Breakpoints */
        @media (max-width: 1400px) {
            .weather-grid {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1.8fr) minmax(0, 1fr);
            }
        }

        @media (max-width: 1200px) {
            .weather-grid {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1.6fr) minmax(0, 1fr);
            }
        }

        @media (max-width: 900px) {
            .weather-grid {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                gap: clamp(0.75rem, 2vh, 1.5rem);
            }

            .current-section {
                order: -1;
            }

            .hourly-section, .daily-section {
                max-height: 40vh;
            }
        }

        @media (max-width: 600px) {
            .weather-container {
                padding: clamp(0.5rem, 3vw, 1rem);
            }

            .header {
                flex-direction: row;
                gap: clamp(0.5rem, 2vw, 1rem);
            }

            .weather-details {
                gap: clamp(1rem, 5vw, 2rem);
            }
        }

        @media (max-height: 820px) {
            .weather-container {
                padding: 0.45rem 0.7rem;
                gap: 0.45rem;
            }

            .header {
                padding: 0.4rem 0.7rem;
            }

            .current-card {
                padding: 0.5rem;
            }

            .weather-details {
                gap: 0.45rem;
            }

            .detail-item {
                padding: 0.45rem 0.55rem;
                min-width: 3.7rem;
            }

            .hourly-item, .daily-item {
                padding: 0.3rem 0.45rem;
            }

            #hourlyForecast, #dailyForecast {
                gap: 0.2rem;
            }

            .section-title {
                margin-bottom: 0.15rem;
            }
        }

        @media (max-height: 720px) {
            .weather-grid {
                gap: 0.55rem;
            }

            #currentWeather {
                justify-content: space-between;
            }

            .weather-details {
                gap: 0.35rem;
            }

            .detail-item {
                padding: 0.35rem 0.45rem;
            }

            .hourly-item, .daily-item {
                padding: 0.25rem 0.35rem;
            }

            #hourlyForecast, #dailyForecast {
                gap: 0.15rem;
            }
        }

    </style>
</head>
<body>
    <div class="weather-container">
        <div class="header">
            <p class="location">Rome, GA 30165</p>
            <div style="display: flex; gap: clamp(0.75rem, 1.5vw, 1rem);">
                <button class="theme-toggle" id="fullscreenToggle" aria-label="Toggle fullscreen">
                    ⛶
                </button>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    ☀️
                </button>
            </div>
        </div>

        <div id="errorContainer"></div>

        <div class="weather-grid" id="weatherContent">
            <!-- Hourly Forecast (Left) -->
            <div class="hourly-section">
                <h2 class="section-title">Next 5 Hours</h2>
                <div id="hourlyForecast">
                    <div class="loading">
                        <div class="spinner spinner-lg"></div>
                        <p>Loading hourly forecast...</p>
                    </div>
                </div>
            </div>

            <!-- Current Weather (Center) -->
            <div class="current-section">
                <div class="current-card">
                    <div id="currentWeather">
                        <div class="loading">
                            <div class="spinner spinner-lg"></div>
                            <p>Loading current weather...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Daily Forecast (Right) -->
            <div class="daily-section">
                <h2 class="section-title">Next 5 Days</h2>
                <div id="dailyForecast">
                    <div class="loading">
                        <div class="spinner spinner-lg"></div>
                        <p>Loading daily forecast...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="last-updated" id="lastUpdated">
            <span id="lastUpdatedText"></span>
            <span style="margin: 0 clamp(0.5rem, 1vw, 1rem);">|</span>
            <span>Created by Chirag Prajapati</span>
        </div>
    </div>
    <script src="weather-icons.js"></script>
    <script src="weather.js"></script>
</body>
</html>
